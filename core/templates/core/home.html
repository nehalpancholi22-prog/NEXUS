{% extends 'core/base.html' %}

{% block content %}

<h1 class="mb-4">My Projects</h1>

<div class="row">
    {% for project in projects %}
        <div class="col-md-4 mb-4">
            <div class="card shadow">
                <div class="card-body">
                    <h5 class="card-title">
                        <a href="/project/{{ project.id }}/">
                            {{ project.title }}
                        </a>
                    </h5>
                    <p class="card-text">{{ project.description|truncatewords:15 }}</p>
                </div>
            </div>
        </div>
    {% endfor %}
</div>

{% endblock %}

{% if project.image %}
    <img src="{{ project.image.url }}" width="200">
{% endif %}
